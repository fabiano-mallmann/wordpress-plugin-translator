name: Bug report
description: Report something that is broken or not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: When I upload a .po file, the editor shows...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to home page
        2. Upload file X
        3. Click export
    validations:
      required: true

  - type: input
    id: plugin-slug
    attributes:
      label: Plugin slug (if applicable)
      placeholder: contact-form-7

  - type: dropdown
    id: flow
    attributes:
      label: Which flow were you using?
      options:
        - WordPress.org plugin URL
        - .po file upload
        - Export (.po / .mo)
        - Other

  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: Chrome 120

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Logs, screenshots, sample .po file (if safe to share), etc.
